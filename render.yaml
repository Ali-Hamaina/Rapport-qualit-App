services:
  - type: web
    name: rapport-qualite-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # set manually in Render dashboard
      - key: UPLOADS_DIR
        value: /opt/render/uploads
    disk:
      name: uploads
      mountPath: /opt/render/uploads
      sizeGB: 1
